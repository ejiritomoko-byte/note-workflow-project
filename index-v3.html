<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>note記事メモ帳 v3</title>
  <link rel="stylesheet" href="note-workflow-v2.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <span class="eyebrow">note Memo</span>
      <h1>note記事メモ帳 v3</h1>
      <p>記事を選んで、依頼内容を決めて、最後にAIへ渡す文章を確認する流れに整理しました。</p>
      <div class="hero-actions">
        <button class="primary-btn" id="newItemBtn" type="button">新しい記事を作る</button>
        <button class="ghost-btn" id="exportBtn" type="button">JSONを書き出し</button>
      </div>
    </header>

    <main class="workspace-layout">
      <aside class="sidebar panel">
        <div class="section-head compact">
          <div>
            <h2>記事一覧</h2>
            <p>左で記事を選びます。</p>
          </div>
        </div>

        <div class="sidebar-tools">
          <label>
            <span>検索</span>
            <input id="searchInput" type="search" placeholder="タイトル・本文・URLで検索">
          </label>
          <label>
            <span>状態</span>
            <select id="statusFilter">
              <option value="all">すべて</option>
              <option value="新規">新規</option>
              <option value="リライト">リライト</option>
              <option value="下書き">下書き</option>
              <option value="公開済み">公開済み</option>
            </select>
          </label>
        </div>

        <div class="article-list sidebar-list" id="articleList"></div>
      </aside>

      <section class="main-column">
        <section class="panel step-panel">
          <div class="step-tabs">
            <button class="step-tab active" id="stepOneTab" type="button">1. 記事内容</button>
            <button class="step-tab" id="stepTwoTab" type="button">2. 依頼内容</button>
            <button class="step-tab" id="stepThreeTab" type="button">3. プロンプト確認</button>
          </div>

          <section class="step-view active" id="stepOneView">
            <div class="section-head">
              <div>
                <h2>記事内容</h2>
                <p>ここで記事本文やURLを管理します。新規記事もここで作れます。</p>
              </div>
              <span class="current-id" id="currentIdLabel"></span>
            </div>

            <div class="capture-box">
              <h3>URLから記事を追加</h3>
              <div class="editor-grid">
                <label class="full">
                  <span>記事ページURL</span>
                  <input id="captureUrlInput" type="text" placeholder="例: https://note.com/moco_edu_note/n/xxxxxxxxxxxx">
                </label>
                <label class="full">
                  <span>取り込みメモ</span>
                  <textarea id="captureMemoInput" rows="3" placeholder="このURLの記事をどう扱いたいかメモ"></textarea>
                </label>
                <div class="form-actions full">
                  <button class="primary-btn" id="captureUrlBtn" type="button">URLから追加</button>
                </div>
              </div>
            </div>

            <form id="itemForm" class="editor-grid">
              <label class="full">
                <span>タイトル</span>
                <input name="title" type="text" required>
              </label>
              <label>
                <span>アカウント</span>
                <select name="account">
                  <option value="moco_edu_note">moco_edu_note</option>
                  <option value="learnfromfailure">learnfromfailure</option>
                </select>
              </label>
              <label>
                <span>状態</span>
                <select name="status">
                  <option value="新規">新規</option>
                  <option value="リライト">リライト</option>
                  <option value="下書き">下書き</option>
                  <option value="公開済み">公開済み</option>
                </select>
              </label>
              <label class="full">
                <span>本文・メモ</span>
                <textarea name="body" rows="14" placeholder="下書きや本文、メモをそのまま入れます"></textarea>
              </label>
              <label class="full">
                <span>元記事URL</span>
                <textarea name="source" rows="3" placeholder="個別記事のURLや参考にしたURLを入れます"></textarea>
              </label>
              <label class="full">
                <span>狙うキーワード</span>
                <input name="mainKeyword" type="text" placeholder="例: 家庭学習 AI / 中学受験 AI">
              </label>
              <label class="full">
                <span>関連キーワード</span>
                <textarea name="subKeywords" rows="3" placeholder="例: ChatGPT, 保護者, 学習アプリ"></textarea>
              </label>
              <label>
                <span>検索ボリューム</span>
                <input name="searchVolume" type="text" placeholder="例: 100〜1000 / 未確認">
              </label>
              <label>
                <span>使うAI</span>
                <select name="targetAi">
                  <option value="ChatGPT">ChatGPT</option>
                  <option value="Claude">Claude</option>
                </select>
              </label>

              <div class="form-actions full">
                <button class="primary-btn" type="submit">保存する</button>
                <button class="ghost-btn" type="button" id="duplicateBtn">複製する</button>
                <button class="ghost-btn" type="button" id="saveDraftBtn">下書きにする</button>
                <button class="ghost-btn" type="button" id="markDoneBtn">投稿完了</button>
                <button class="ghost-btn" type="button" id="goStepTwoBtn">次へ進む</button>
              </div>
            </form>
          </section>

          <section class="step-view" id="stepTwoView">
            <div class="section-head">
              <div>
                <h2>依頼内容</h2>
                <p>AIに何をしてほしいかをここでまとめます。</p>
              </div>
            </div>

            <form id="requestForm" class="editor-grid">
              <label>
                <span>AIへの頼み方</span>
                <select name="aiGoal">
                  <option value="rewrite">リライトする</option>
                  <option value="draft">下書きをする</option>
                  <option value="check">チェックする</option>
                </select>
              </label>
              <label>
                <span>プロンプトの型</span>
                <select name="promptType">
                  <option value="paid">有料note用</option>
                  <option value="search">検索流入用</option>
                  <option value="rewrite">リライト特化用</option>
                </select>
              </label>
              <label class="full">
                <span>追加したい内容</span>
                <textarea name="additions" rows="4" placeholder="足したい情報、具体例、体験談、比較表など"></textarea>
              </label>
              <label class="full">
                <span>削除したい内容</span>
                <textarea name="removals" rows="4" placeholder="削りたい説明、重複、長すぎる部分など"></textarea>
              </label>
              <label class="full">
                <span>表現を変えたい箇所</span>
                <textarea name="toneChanges" rows="4" placeholder="やわらかくしたい、断定を弱めたい、もっと強くしたい、など"></textarea>
              </label>
              <label class="full">
                <span>その他依頼</span>
                <textarea name="extraRequests" rows="4" placeholder="無料部分の見せ方、有料へのつなぎ、タイトル案も欲しい、など"></textarea>
              </label>
              <label>
                <span>画像生成</span>
                <select name="needImagePrompt">
                  <option value="yes">あり</option>
                  <option value="no">なし</option>
                </select>
              </label>

              <div class="form-actions full">
                <button class="ghost-btn" type="button" id="backToStepOneBtn">戻る</button>
                <button class="primary-btn" type="submit">内容を確定して次へ</button>
              </div>
            </form>
          </section>

          <section class="step-view" id="stepThreeView">
            <div class="section-head">
              <div>
                <h2>プロンプト確認</h2>
                <p>必要ならここで確認して、そのまま次のAIに貼ります。</p>
              </div>
            </div>

            <div class="prompt-stack">
              <section class="panel nested-panel">
                <div class="section-head">
                  <div>
                    <h2>AIに渡す文章</h2>
                    <p>本文改善やチェック用の依頼文です。</p>
                  </div>
                  <button class="primary-btn" id="copyPromptBtn" type="button">全文コピー</button>
                </div>
                <textarea id="promptOutput" rows="14" readonly></textarea>
              </section>

              <section class="panel nested-panel">
                <div class="section-head">
                  <div>
                    <h2>メイン画像プロンプト</h2>
                    <p>画像生成が必要なときだけ使います。</p>
                  </div>
                  <button class="primary-btn" id="copyImagePromptBtn" type="button">全文コピー</button>
                </div>
                <textarea id="imagePromptOutput" rows="10" readonly></textarea>
              </section>

              <section class="panel nested-panel">
                <h2>確認ポイント</h2>
                <ul class="check-list" id="reviewChecklist"></ul>
              </section>
            </div>

            <div class="form-actions">
              <button class="ghost-btn" type="button" id="backToStepTwoBtn">戻る</button>
            </div>
          </section>
        </section>
      </section>
    </main>
  </div>

  <script src="note-workflow-v2.js"></script>
</body>
</html>
